<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="referrer" content="unsafe-url" />
    <title>AfriTranslate AI | Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg-main: #121212;
        --bg-surface: #171717;
        --border-color: #262626;
        --accent: #F4A300;
      }
      
      html, body, #root {
        height: 100dvh;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll to maintain app layout, but internal containers will scroll */
      }

      body {
        font-size: 13px;
        background-color: var(--bg-main);
        color: #e5e5e5;
        font-family: 'Inter', sans-serif;
        line-height: 1.35;
      }

      /* Visible High-Quality Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
        border: 2px solid var(--bg-main);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #333 transparent;
      }

      .custom-scrollbar {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      .prose {
        color: #a3a3a3;
        font-size: 13px;
        line-height: 1.4;
      }
      .prose strong { color: #fff; }
      .prose h1, .prose h2, .prose h3 { color: #fff; margin-top: 0.5em; margin-bottom: 0.3em; font-size: 1.05em; }
      
      .animate-fade-in {
        animation: fadeIn 0.2s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(2px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Transitions */
      .view-transition-enter { opacity: 0; transform: scale(0.98); }
      .view-transition-enter-active { opacity: 1; transform: scale(1); transition: all 200ms ease-out; }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              brand: ['Poppins', 'sans-serif'],
            },
            fontSize: {
              'xs': '10px',
              'sm': '11.5px',
              'base': '13px',
              'lg': '14px',
              'xl': '16px',
              '2xl': '20px',
            },
            colors: {
              'brand-primary': '#F4A300',
              'bg-main': '#121212',
              'bg-surface': '#171717',
              'border-default': '#262626',
              'text-primary': '#e5e5e5',
              'text-secondary': '#737373',
              'accent': '#F4A300',
            }
          }
        }
      }
    </script>

  }
}
</script>
