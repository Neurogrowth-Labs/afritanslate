
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>AfriTranslate AI | Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg-main: #121212;
        --bg-surface: #171717;
        --border-color: #262626;
        --accent: #F4A300;
      }
      
      html, body, #root {
        height: 100dvh;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll to maintain app layout, but internal containers will scroll */
      }

      body {
        font-size: 13px;
        /* Subtle radial gradient to give depth to the dark mode */
        background: radial-gradient(circle at top center, #1f1f1f 0%, #121212 60%);
        color: #e5e5e5;
        font-family: 'Inter', sans-serif;
        line-height: 1.35;
        overflow-x: hidden;
      }

      /* ── Mobile responsiveness foundation ───────────────────────────── */

      /*
       * iOS Safari auto-zooms when a focused form control has font-size < 16px.
       * Force every text input to >= 16px on small viewports so focusing a
       * field never zooms the page.
       */
      @media (max-width: 1024px) {
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="search"],
        input[type="tel"],
        input[type="url"],
        input[type="number"],
        input:not([type]),
        textarea,
        select {
          font-size: max(16px, 1rem);
        }
      }

      /* Ensure body text is at least 14px on mobile (Tailwind's `text-base`
         resolves to 13px in this app's overridden scale). */
      @media (max-width: 767px) {
        body {
          font-size: 14px;
          line-height: 1.45;
        }
      }

      /* 44px minimum touch target for any element marked with .touch-target.
         Used by the bottom-nav, hamburger, and other mobile-only buttons. */
      .touch-target {
        min-height: 44px;
        min-width: 44px;
      }

      /* Visible :active state for any interactive element on touch devices.
         Pairs with the no-hover-only-UI rule. */
      @media (hover: none) {
        button:active,
        a:active,
        [role="button"]:active {
          opacity: 0.7;
          transition: opacity 0.05s ease-out;
        }
      }

      /* Hint that a horizontally-scrollable table can be scrolled. Apply via
         the `.table-scroll-hint` wrapper around `<table>` or wide content. */
      .table-scroll-hint {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        position: relative;
      }
      .table-scroll-hint::after {
        content: "";
        position: sticky;
        top: 0;
        right: 0;
        width: 24px;
        height: 100%;
        pointer-events: none;
        background: linear-gradient(to right, transparent, rgba(244, 163, 0, 0.08));
        display: block;
      }

      /* Bottom-sheet style for modal dialogs on mobile. Target via the
         `.mobile-bottom-sheet` class on the modal's outer container. */
      @media (max-width: 767px) {
        .mobile-bottom-sheet {
          align-items: flex-end !important;
        }
        .mobile-bottom-sheet > * {
          width: 100% !important;
          max-width: 100% !important;
          border-radius: 16px 16px 0 0 !important;
          max-height: 90dvh;
        }
      }

      /* Slim, premium scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(244, 163, 0, 0.5); /* Accent color with opacity */
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }

      .custom-scrollbar {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      .prose {
        color: #a3a3a3;
        font-size: 13px;
        line-height: 1.6; /* Improved readability */
      }
      .prose strong { color: #fff; font-weight: 600; }
      .prose h1, .prose h2, .prose h3 { color: #fff; margin-top: 1em; margin-bottom: 0.5em; font-weight: 600; }
      
      .animate-fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-slide-in-up {
        animation: slideInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-pulse-slow {
        animation: pulseSlow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseSlow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }

      /* Transitions */
      .view-transition-enter { opacity: 0; transform: scale(0.98); }
      .view-transition-enter-active { opacity: 1; transform: scale(1); transition: all 200ms ease-out; }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              brand: ['Poppins', 'sans-serif'],
            },
            fontSize: {
              'xs': '10px',
              'sm': '11.5px',
              'base': '13px',
              'lg': '14px',
              'xl': '16px',
              '2xl': '20px',
              '3xl': '24px',
              '4xl': '32px',
              '5xl': '48px',
              '6xl': '64px',
            },
            colors: {
              'brand-primary': '#F4A300',
              'bg-main': '#121212',
              'bg-surface': '#171717',
              'border-default': '#262626',
              'text-primary': '#e5e5e5',
              'text-secondary': '#737373',
              'accent': '#F4A300',
            },
            animation: {
                'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'spin-slow': 'spin 12s linear infinite',
            }
          }
        }
      }
    </script>

}
